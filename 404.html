<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found - ProjectFlow</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23ff5352'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Inter,Arial,sans-serif' font-size='22' font-weight='800' fill='white'%3EPF%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --background: #0c1320;
      --surface: #19202d;
      --on-surface: #dce2f5;
      --primary: #ffb3ae;
      --primary-strong: #ff5352;
      --secondary: #bcc7de;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(255, 83, 82, 0.10), transparent 26rem),
        radial-gradient(circle at 85% 0%, rgba(188, 199, 222, 0.13), transparent 22rem),
        var(--background);
      color: var(--on-surface);
      text-align: center;
      padding: 24px;
    }

    .error-code {
      font-size: clamp(80px, 16vw, 160px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      margin-top: 16px;
      font-size: 24px;
      font-weight: 700;
    }

    p {
      margin-top: 12px;
      color: var(--secondary);
      font-size: 16px;
      line-height: 24px;
      max-width: 420px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      padding: 12px 24px;
      border: 1px solid rgba(255, 179, 174, 0.34);
      border-radius: 4px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .back-link:hover {
      border-color: var(--primary-strong);
      background: rgba(255, 83, 82, 0.16);
      color: white;
    }

    .back-link:focus-visible {
      outline: 2px solid var(--primary-strong);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="back-link" href="./">Back to ProjectFlow Hub</a>
  </main>
</body>
</html>
